<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Skeletal Dragon</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body { margin:0; overflow:hidden; background:#e8e0d4; touch-action:none; cursor:none; }
  canvas { display:block; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener("resize", () => { 
    canvas.width = window.innerWidth; 
    canvas.height = window.innerHeight; 
});

// ── mouse ──
let mouse = { x: canvas.width/2, y: canvas.height/2 };

window.addEventListener("mousemove", e => { 
    mouse.x = e.clientX; 
    mouse.y = e.clientY; 
});

window.addEventListener("touchmove", e => {
    e.preventDefault();
    mouse.x = e.touches[0].clientX;
    mouse.y = e.touches[0].clientY;
}, { passive: false });

// ── spine ──
const N = 32;
const SEG = 20;

const spine = [];
for (let i = 0; i < N; i++) spine.push({ x: canvas.width/2, y: canvas.height/2 });

let cursor = { x: canvas.width/2, y: canvas.height/2 };

// ── 🆕 tail physics ──
const tailJiggle = [];
for (let i = 0; i < 6; i++) {
  tailJiggle.push({ x: 0, y: 0 });
}

function update() {

cursor.x += (mouse.x - cursor.x) * 0.2;
cursor.y += (mouse.y - cursor.y) * 0.2;

spine[0].x += (cursor.x - spine[0].x) * 0.25;
spine[0].y += (cursor.y - spine[0].y) * 0.25;

for (let i = 1; i < N; i++) {

    let px = spine[i-1].x, py = spine[i-1].y;
    let sx = spine[i].x, sy = spine[i].y;

    let dx = sx - px;
    let dy = sy - py;

    let dist = Math.sqrt(dx*dx + dy*dy) || 0.001;

    let tx = px - (dx/dist) * SEG;
    let ty = py - (dy/dist) * SEG;

    spine[i].x += (tx - spine[i].x) * 0.55;
    spine[i].y += (ty - spine[i].y) * 0.55;
}

// ── tail follow ──
for (let i = 0; i < tailJiggle.length; i++) {
  let target = spine[N - 1 - i];
  if (!target) continue;

  tailJiggle[i].x += (target.x - tailJiggle[i].x) * 0.3;
  tailJiggle[i].y += (target.y - tailJiggle[i].y) * 0.3;
}
}

function segAngle(i) {
let a = i > 0 ? spine[i-1] : spine[i];
let b = i < N-1 ? spine[i+1] : spine[i];
return Math.atan2(b.y - a.y, b.x - a.x);
}

// ── skull ──
function drawSkull(x, y, angle) {
ctx.save();
ctx.translate(x, y);
ctx.rotate(angle);

ctx.fillStyle = "#ddd";
ctx.strokeStyle = "#222";
ctx.lineWidth = 2;

ctx.beginPath();
ctx.ellipse(0, 0, 20, 14, 0, 0, Math.PI*2);
ctx.fill();
ctx.stroke();

ctx.restore();
}

// ── vertebra ──
function drawVertebra(x, y, angle) {
ctx.save();
ctx.translate(x, y);
ctx.rotate(angle);

ctx.fillStyle = "#d0c8b8";
ctx.strokeStyle = "#333";

ctx.beginPath();
ctx.rect(-6, -4, 12, 8);
ctx.fill();
ctx.stroke();

ctx.restore();
}

// ── 🐉 upgraded tail ──
function drawTailFin() {

ctx.save();

for (let i = 0; i < tailJiggle.length; i++) {

  let p = tailJiggle[i];
  let n = tailJiggle[i + 1] || tailJiggle[i - 1] || p;

  let ang = Math.atan2(n.y - p.y, n.x - p.x);

  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.rotate(ang);

  let scale = 1 - i * 0.12;

  ctx.fillStyle = i === 0 ? "#bbb" : "#999";
  ctx.strokeStyle = "#333";
  ctx.lineWidth = 1.5;

  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(18 * scale, -2 * scale);
  ctx.lineTo(18 * scale, 2 * scale);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  ctx.restore();
}

// tip
let tip = tailJiggle[tailJiggle.length - 1];

ctx.fillStyle = "#888";
ctx.beginPath();
ctx.arc(tip.x, tip.y, 3, 0, Math.PI*2);
ctx.fill();

ctx.restore();
}

// ── loop ──
function draw() {

ctx.fillStyle = "rgba(232,224,212,0.4)";
ctx.fillRect(0, 0, canvas.width, canvas.height);

update();

for (let i = N - 1; i >= 1; i--) {
drawVertebra(spine[i].x, spine[i].y, segAngle(i));
}

drawTailFin();

drawSkull(spine[0].x, spine[0].y, segAngle(0));

requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
